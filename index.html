<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="post">
      <div class="post-header">
    <img class="post-perfil-image" src="https://i.pinimg.com/736x/3d/43/57/3d43579aade53c9eef2cf9f73b86f3e4.jpg" alt="">
    <div class="post-user-info">
    <div class="post-perfil-name">Marianapnp</div>
    <div class="post-title">My post</div>
</div>
        <div class="post-menu">
     <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>
</div>
        <div class="post-image-container">
            <img class="post-image" src="https://i.pinimg.com/736x/09/1c/78/091c78975bd12d79a8d1f5562cebfd89.jpg" alt=" ">
        </div> 
        <div class="post-icons">
    <div class="left-icons">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-comment"></i>
        <i class="fa-regular fa-paper-plane"></i>
    </div>
    <div class="right-icon">
        <i class="fa-regular fa-bookmark"></i>
    </div>
</div>
        <div class="post-body">
            <div class="post-content">
                <p class="likes">
    Liked by <strong>Angel</strong>,
    <strong>Eva</strong>,
    <strong>Luna</strong> and
    <strong>100,000 others</strong>
</p>
<p>Dexter no solo conquista corazones con sus ojos curiosos, también llena cada rincón de alegría con sus travesuras. 🐾✨ Entre siestas interminables y momentos de exploración, demuestra que la vida es mucho mejor con un gato cerca. 💙🐱</p>
            </div>     
        </div>
    </div>
</body>
</html>
